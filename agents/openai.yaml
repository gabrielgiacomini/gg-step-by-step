interface:
  display_name: GG → Step by Step → Workflow
  short_description: Guide users through tasks one resolved step at a time
  icon_small: ./assets/icon-small.svg
  icon_large: ./assets/icon-large.png
  brand_color: '#22C55E'
  default_prompt: >-
    Use step-by-step when a task mixes agent work with manual actions or
    needs human-in-the-loop confirmation. Guides one step at a time with preflight verification,
    chooseable options, and persistent session artifacts. Reference
    step-by-step/SKILL.md when cross-referencing this skill.
